name: Build and Push Docker Images

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Two parallel builds for different architectures
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: ''
          - platform: linux/arm64
            suffix: '-arm64'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/netsentry-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'sensor' }}
          tags: |
            type=ref,event=branch
            type=sha
            type=tag,pattern=v{{raw}}
            latest

      - name: Build and push Suricata image
        uses: docker/build-push-action@v5
        with:
          context: ./images/suricata
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/netsentry-suricata${{ matrix.suffix }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/netsentry-suricata${{ matrix.suffix }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/netsentry-suricata${{ matrix.suffix }}:latest
          cache-to: type=inline
          build-args: |
            BUILD_TYPE=release

      - name: Build and push API Gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./images/api-gateway
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/netsentry-api-gateway${{ matrix.suffix }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/netsentry-api-gateway${{ matrix.suffix }}:latest

      - name: Build and push Bridge image
        uses: docker/build-push-action@v5
        with:
          context: ./images/bridge
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/netsentry-bridge${{ matrix.suffix }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/netsentry-bridge${{ matrix.suffix }}:latest

  # Multi-arch manifest for seamless multi-platform support
  manifest:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest for Suricata
        run: |
          docker manifest create ghcr.io/${{ github.repository }}/netsentry-suricata:latest \
            ghcr.io/${{ github.repository }}/netsentry-suricata:latest \
            ghcr.io/${{ github.repository }}/netsentry-suricata-arm64:latest \
            --amend
          docker manifest push ghcr.io/${{ github.repository }}/netsentry-suricata:latest

      - name: Create manifest for API Gateway
        run: |
          docker manifest create ghcr.io/${{ github.repository }}/netsentry-api-gateway:latest \
            ghcr.io/${{ github.repository }}/netsentry-api-gateway:latest \
            ghcr.io/${{ github.repository }}/netsentry-api-gateway-arm64:latest \
            --amend
          docker manifest push ghcr.io/${{ github.repository }}/netsentry-api-gateway:latest

      - name: Create manifest for Bridge
        run: |
          docker manifest create ghcr.io/${{ github.repository }}/netsentry-bridge:latest \
            ghcr.io/${{ github.repository }}/netsentry-bridge:latest \
            ghcr.io/${{ github.repository }}/netsentry-bridge-arm64:latest \
            --amend
          docker manifest push ghcr.io/${{ github.repository }}/netsentry-bridge:latest
