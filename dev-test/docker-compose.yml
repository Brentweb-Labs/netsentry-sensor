# =============================================================================
# NetSentry Dev/Test Simulation - Docker Compose
# =============================================================================
# Production-grade simulation using actual NetSentry sensor implementations.
# This runs all the edge services (raspi-collector, network-filter, rule-engine, etc.)
# in Docker on a single host - simulating the Pi sensor without hardware.
#
# Topology: Attacker -> Suricata -> Victim
# Network: Isolated bridge network simulating Pi LAN
#
# Usage:
#   cd dev-test
#   docker compose up --build   # Build and start all services
#   docker compose logs -f      # View all logs
#
# Cost: €0 | Hardware: Single Docker host | No physical Pi required
# =============================================================================

# Custom bridge network (simulates Pi LAN subnet)
networks:
  idps_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1

# Named volumes
volumes:
  suricata_logs:
    driver: local
  suricata_rules:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local

services:
  # ========================================================================
  # Component B: The Attacker (threat simulator)
  # ========================================================================
  attacker:
    image: kalilinux/kali-rolling:latest
    container_name: attacker
    hostname: attacker
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.2
    user: root
    command: >
      /bin/bash -c "
      export DEBIAN_FRONTEND=noninteractive &&
      apt-get update &&
      apt-get install -y nmap curl wget sqlmap hydra net-tools iputils-ping dnsutils && apt-get clean && rm -rf /var/lib/apt/lists/* &&
      tail -f /dev/null
      "
    environment:
      - TZ=UTC
      - TERM=xterm
    volumes:
      - ./scripts:/attack-scripts:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ========================================================================
  # Component A: The Victim (DVWA vulnerable web app)
  # ========================================================================
  victim:
    image: citizenstig/dvwa:latest
    container_name: victim
    hostname: victim-dvwa
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.4
    user: www-data
    environment:
      - TZ=UTC
      - TERM=xterm
      - DB_HOST=127.0.0.1
      - DB_USER=root
      - DB_PASSWORD=p@ssw0rd
      - DB_NAME=dvwa
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ========================================================================
  # Component C: The Sensor - Suricata IDPS (from Pi sensor)
  # ========================================================================
  suricata:
    image: jasonish/suricata:7.0.5
    container_name: suricata
    hostname: suricata-sensor
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.3
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    environment:
      - TZ=UTC
      - TERM=xterm
      - SURICATA_RUN_MODE=autofp
      - SURICATA_IFACE=eth0
    command: >
      suricata
      -c /etc/suricata/suricata.yaml
      -i eth0
      --af-packet
      -vv
      -l /var/log/suricata
    volumes:
      - suricata_logs:/var/log/suricata
      - suricata_rules:/var/lib/suricata/rules
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./data/logs/suricata:/var/log/suricata:delegated
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ========================================================================
  # NetSentry Edge Service 1: MongoDB (Pi uses local, dev-test uses container)
  # ========================================================================
  mongodb:
    image: mongo:7.0
    container_name: idps-mongodb-dev
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.5
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-DevPassword123!}
      MONGO_INITDB_DATABASE: idps_database
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========================================================================
  # NetSentry Edge Service 2: Redis (session cache)
  # ========================================================================
  redis:
    image: redis:7.4-alpine
    container_name: idps-redis-dev
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.6
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-DevRedis123!} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ========================================================================
  # NetSentry Edge Service 3: Network Filter (iptables enforcement)
  # ========================================================================
  network-filter:
    build:
      context: ../..
      dockerfile: src/services/edge/network-filter/Dockerfile
    container_name: idps-network-filter-dev
    hostname: network-filter
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.7
    environment:
      - FILTER_MODE=standalone
      - MONGODB_URI=mongodb://admin:${MONGO_ROOT_PASSWORD:-DevPassword123!}@10.10.10.5:27017/idps_database?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-DevRedis123!}@10.10.10.6:6379
      - RUST_LOG=info
    volumes:
      - ./logs/network-filter:/var/log/idps/network-filter
    depends_on:
      mongodb:
        condition: service_healthy
    cap_add:
      - NET_RAW
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ========================================================================
  # NetSentry Edge Service 4: Rule Engine (Suricata rule management)
  # ========================================================================
  rule-engine:
    build:
      context: ../..
      dockerfile: src/services/edge/rule-engine/Dockerfile
    container_name: idps-rule-engine-dev
    hostname: rule-engine
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.8
    environment:
      - RULE_ENGINE_PORT=8094
      - MONGODB_URI=mongodb://admin:${MONGO_ROOT_PASSWORD:-DevPassword123!}@10.10.10.5:27017/idps_database?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-DevRedis123!}@10.10.10.6:6379
      - SURICATA_SOCKET_PATH=/var/run/suricata/suricata-command.socket
      - RUST_LOG=info
    volumes:
      - ./data/suricata/rules:/etc/suricata/rules
      - /var/run/suricata:/var/run/suricata
      - suricata_logs:/var/log/suricata:ro
    depends_on:
      - suricata
      - mongodb
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================================================
  # NetSentry Edge Service 5: Raspi Collector (eve.json -> cloud bridge)
  # ========================================================================
  raspi-collector:
    build:
      context: ../..
      dockerfile: src/services/edge/raspi-collector/Dockerfile
    container_name: idps-raspi-collector-dev
    hostname: raspi-collector
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.9
    environment:
      - COLLECTOR_MODE=standalone
      # Use dummy VPS values for dev-test (no actual cloud connection)
      - VPS_ENDPOINT=http://localhost:8080
      - VPS_WS_URL=ws://localhost:8080/ws
      - API_KEY=dev-test-key
      - MONGODB_URI=mongodb://admin:${MONGO_ROOT_PASSWORD:-DevPassword123!}@10.10.10.5:27017/idps_database?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-DevRedis123!}@10.10.10.6:6379
      - NETWORK_FILTER_URL=http://10.10.10.7:8092/api/v1
      - RULE_ENGINE_URL=http://10.10.10.8:8094/api/v1
      - SURICATA_EVE_PATH=/var/log/suricata/eve.json
      - RUST_LOG=info
    volumes:
      - ./logs/raspi-collector:/var/log/idps/raspi-collector
      - ./data/logs/suricata:/var/log/suricata:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      suricata:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ========================================================================
  # NetSentry Edge Service 6: Telemetry (hardware metrics)
  # ========================================================================
  telemetry:
    build:
      context: ../..
      dockerfile: src/services/edge/telemetry/Dockerfile
    container_name: idps-telemetry-dev
    hostname: telemetry
    restart: unless-stopped
    networks:
      idps_net:
        ipv4_address: 10.10.10.10
    environment:
      - DEVICE_ID=dev-test-sensor
      - VPS_URL=http://localhost:8080
      - TELEMETRY_PORT=8096
      - RUST_LOG=info
      - COLLECTION_INTERVAL_SECS=30
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    depends_on:
      - raspi-collector
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
