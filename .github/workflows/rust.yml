name: Build and Release Rust Binaries

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Build for ARM64 (Raspberry Pi) and AMD64
        target: [aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install ARM64 cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build release binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C target-feature=+crt-static
          OPENSSL_STATIC: 1
          OPENSSL_DIR: /tmp/openssl-static
        run: |
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            mkdir -p /tmp/openssl-static
            # Download and build OpenSSL statically for ARM64
            cd /tmp
            curl -sSL https://www.openssl.org/source/openssl-1.1.1w.tar.gz | tar xz
            cd openssl-1.1.1w
            CC=aarch64-linux-gnu-gcc ./Configure --prefix=/tmp/openssl-static linux-aarch64 no-shared
            make
            make install_sw
            cd -
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Create binary archive
        run: |
          mkdir -p release
          # Package all edge services
          for bin in packet-processor network-filter firewall-forwarder rule-engine raspi-collector telemetry; do
            if [ -f "target/${{ matrix.target }}/release/$bin" ]; then
              cp "target/${{ matrix.target }}/release/$bin" release/
            fi
          done
          # Also copy shared libs if needed
          tar -czvf netsentry-sensor-${{ matrix.target }}.tar.gz release/
          ls -la release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netsentry-binaries-${{ matrix.target }}
          path: release/
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download AMD64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: netsentry-binaries-x86_64-unknown-linux-gnu
          path: amd64

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: netsentry-binaries-aarch64-unknown-linux-gnu
          path: arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            amd64/*
            arm64/*
          generate_release_notes: true
