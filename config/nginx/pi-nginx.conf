# Nginx config for the Raspberry Pi local dashboard.
# Serves the static dashboard UI and proxies API requests to the
# local raspi-rust (collector) service and the local network-filter service.

worker_processes auto;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        resolver 127.0.0.11 valid=10s ipv6=off;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

        # Serve the static dashboard
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API calls to the raspi collector / rust service
        location /api/collector/ {
            set $collector idps-raspi-rust;
            rewrite ^/api/collector/(.*)$ /$1 break;
            proxy_pass http://$collector:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy prevention/blocking API calls to the local network-filter service
        location /api/prevention/ {
            set $nf localhost;
            rewrite ^/api/prevention/(.*)$ /api/v1/$1 break;
            proxy_pass http://$nf:8092;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
