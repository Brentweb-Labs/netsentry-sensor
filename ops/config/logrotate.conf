# IDPS Raspberry Pi Rust Logrotate Configuratie
# Specifiek voor Rust-based IDS component

# Rust application logs
/var/log/idps/raspi-rust/*.log {
    daily
    rotate 14
    size 30M
    maxage 14
    
    compress
    delaycompress
    create 644 rust rust
    
    postrotate
        systemctl reload raspi-rust > /dev/null 2>&1 || true
        logger -t raspi-rust-logrotate "Rust logs geroteerd"
    endscript
}

# Rust service logs
/var/log/idps/raspi-rust/service_*.log {
    daily
    rotate 7
    size 25M
    maxage 7
    
    compress
    delaycompress
    create 644 rust rust
    
    postrotate
        logger -t raspi-rust-logrotate "Service logs geroteerd"
    endscript
}

# Performance metrics logs
/var/log/idps/raspi-rust/metrics_*.log {
    hourly
    rotate 24  # 1 uur voor metrics
    size 10M
    maxage 1
    
    compress
    delaycompress
    create 644 rust rust
    
    postrotate
        /opt/idps/raspi-rust/scripts/process-metrics.sh >> /var/log/idps/raspi-rust/metrics_processing.log 2>&1 || true
        logger -t raspi-rust-logrotate "Metrics logs geroteerd"
    endscript
}
